<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Descubre Tu Tipo de Cuerpo y Colores — Look de Empresarias</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff5f7; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
.quiz-wrap { max-width: 620px; width: 100%; background: #fff; border-radius: 16px; padding: 2rem; box-shadow: 0 2px 24px rgba(212,83,126,0.08); }
.brand { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
.brand-dot { width: 10px; height: 10px; border-radius: 50%; background: #D4537E; }
.brand-name { font-size: 13px; font-weight: 600; color: #D4537E; letter-spacing: 0.5px; text-transform: uppercase; }
.progress-bar-bg { background: #f0f0f0; border-radius: 99px; height: 6px; margin-bottom: 1.5rem; }
.progress-bar-fill { height: 6px; border-radius: 99px; background: #D4537E; transition: width 0.4s ease; }
.step-label { font-size: 13px; color: #888; margin-bottom: 0.5rem; }
.question-title { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 0.25rem; }
.question-sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
.options-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
.option-btn { background: #fff; border: 1.5px solid #e8e8e8; border-radius: 10px; padding: 14px 16px; text-align: left; cursor: pointer; font-size: 14px; color: #1a1a1a; transition: border-color 0.2s, background 0.2s; display: flex; align-items: center; gap: 14px; width: 100%; }
.option-btn:hover { border-color: #D4537E; background: #fff8fa; }
.option-btn.selected { border: 2px solid #D4537E; background: #fff0f5; color: #72243E; }
.option-icon { width: 40px; height: 40px; border-radius: 50%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.option-text-wrap { display: flex; flex-direction: column; gap: 2px; }
.option-main { font-size: 14px; font-weight: 500; }
.option-detail { font-size: 12px; color: #888; }
.option-btn.selected .option-detail { color: #993356; }
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
.btn-next { background: #D4537E; color: white; border: none; border-radius: 10px; padding: 12px 28px; font-size: 15px; font-weight: 500; cursor: pointer; }
.btn-next:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-back { background: transparent; border: 1.5px solid #ddd; border-radius: 10px; padding: 12px 20px; font-size: 14px; color: #666; cursor: pointer; }
.result-card { background: #fff; border: 1.5px solid #f0e0e8; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
.result-badge { display: inline-block; background: #fff0f5; color: #72243E; font-size: 12px; font-weight: 600; padding: 4px 14px; border-radius: 99px; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
.result-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 0.5rem; }
.result-desc { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 0.5rem; }
.result-section { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 0.5rem; margin-top: 1.25rem; }
.tag-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.tag { background: #f5f5f5; border-radius: 99px; padding: 5px 14px; font-size: 13px; color: #333; }
.tag.yes { background: #eaf3de; color: #3B6D11; }
.tag.no { background: #fcebeb; color: #A32D2D; }
.prompt-box { background: #fdf6f8; border-radius: 10px; padding: 1rem; font-size: 13px; color: #444; line-height: 1.8; margin-top: 0.75rem; border-left: 4px solid #D4537E; white-space: pre-wrap; font-family: monospace; }
.copy-btn { display: flex; align-items: center; gap: 8px; background: #fff; border: 1.5px solid #ddd; border-radius: 10px; padding: 10px 16px; font-size: 13px; color: #555; cursor: pointer; margin-top: 1rem; }
.restart-btn { width: 100%; background: transparent; border: 2px solid #D4537E; color: #D4537E; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 1.5rem; }
.congrats { text-align: center; padding: 1rem 0 1.5rem; }
.congrats-title { font-size: 22px; font-weight: 700; color: #D4537E; margin-bottom: 0.25rem; }
.congrats-sub { font-size: 14px; color: #666; }
</style>
</head>
<body>
<div class="quiz-wrap">
  <div class="brand"><div class="brand-dot"></div><span class="brand-name">Look de Empresarias</span></div>
  <div id="quiz-container"></div>
</div>
<script>
const preguntas=[{id:"hombros_caderas",titulo:"Tus hombros comparados con tus caderas",sub:"Ponte de pie frente al espejo. ¿Cómo describes la relación entre tus hombros y tus caderas?",opciones:[{emoji:"⬆️",texto:"Mis hombros son más anchos que mis caderas",valor:"hombros_anchos"},{emoji:"⬇️",texto:"Mis caderas son más anchas que mis hombros",valor:"caderas_anchas"},{emoji:"↔️",texto:"Mis hombros y caderas son casi iguales de ancho",valor:"iguales"},{emoji:"⏳",texto:"Tengo cintura muy definida, como reloj de arena",valor:"reloj_arena"}]},{id:"cintura",titulo:"Tu cintura",sub:"¿Cómo describirías tu cintura en relación al resto de tu cuerpo?",opciones:[{emoji:"✨",texto:"Está bien definida y marcada naturalmente",valor:"definida"},{emoji:"〰️",texto:"Es poco visible, mi silueta es más recta",valor:"recta"},{emoji:"🔵",texto:"Tengo más volumen en el centro que en hombros y caderas",valor:"volumen_centro"},{emoji:"💫",texto:"Varía según la ropa que use",valor:"variable"}]},{id:"altura",titulo:"Tu altura aproximada",sub:"Selecciona el rango que mejor te describe",opciones:[{emoji:"🌸",texto:"Baja",detalle:"Menos de 5'2\" / menos de 158 cm",valor:"baja"},{emoji:"🌺",texto:"Media",detalle:"5'2\" a 5'6\" / 158 cm a 168 cm",valor:"media"},{emoji:"🌹",texto:"Alta",detalle:"Más de 5'6\" / más de 168 cm",valor:"alta"}]},{id:"zona_mas_volumen",titulo:"¿Dónde tienes más volumen?",sub:"Sé honesta — esta información nos ayuda a darte recomendaciones más precisas",opciones:[{emoji:"⬆️",texto:"En la parte superior (busto, espalda, brazos)",valor:"superior"},{emoji:"⬇️",texto:"En la parte inferior (caderas, glúteos, muslos)",valor:"inferior"},{emoji:"↕️",texto:"Distribuido uniformemente",valor:"uniforme"},{emoji:"🎯",texto:"En el centro (zona abdominal)",valor:"centro"}]},{id:"tono_piel",titulo:"Tu tono de piel",sub:"Esto nos ayuda a identificar los colores que más te favorecen",opciones:[{emoji:"🌤️",texto:"Clara o muy clara",detalle:"Se broncea poco o nada",valor:"clara"},{emoji:"🌥️",texto:"Media o trigueña",detalle:"Se broncea moderadamente",valor:"media"},{emoji:"🌙",texto:"Oscura o morena profunda",detalle:"Se broncea fácilmente",valor:"oscura"},{emoji:"✨",texto:"Con subtono rosado o rojizo visible",detalle:"Independiente del tono base",valor:"rosada"}]},{id:"subtono",titulo:"El subtono de tu piel",sub:"Mira la parte interna de tu muñeca a la luz natural. ¿Qué color tienen tus venas?",opciones:[{emoji:"💙",texto:"Azules o moradas",detalle:"Subtono frío",valor:"frio"},{emoji:"💚",texto:"Verdes",detalle:"Subtono cálido",valor:"calido"},{emoji:"💜",texto:"Mezcla de azul y verde",detalle:"Subtono neutro",valor:"neutro"},{emoji:"🤔",texto:"No estoy segura",detalle:"Te asignaremos subtono neutro",valor:"neutro"}]},{id:"objetivo_imagen",titulo:"¿Qué quieres proyectar principalmente?",sub:"Piensa en cómo quieres que te perciban tus clientes",opciones:[{emoji:"👑",texto:"Autoridad y liderazgo",valor:"autoridad"},{emoji:"🤝",texto:"Calidez y cercanía",valor:"calidez"},{emoji:"💎",texto:"Lujo y exclusividad",valor:"lujo"},{emoji:"⚡",texto:"Dinamismo y modernidad",valor:"modernidad"}]},{id:"contexto",titulo:"¿Dónde apareces más en tu negocio?",sub:"Esto nos ayuda a personalizar tus recomendaciones de outfit",opciones:[{emoji:"📱",texto:"En redes sociales",detalle:"Reels, fotos, lives",valor:"redes"},{emoji:"💻",texto:"En videollamadas y Zoom",valor:"zoom"},{emoji:"🎤",texto:"En eventos presenciales",detalle:"Conferencias o networking",valor:"eventos"},{emoji:"🌐",texto:"En todos los anteriores por igual",valor:"todos"}]}];
const resultados={triangulo_invertido:{nombre:"Triángulo Invertido",desc:"Tus hombros son más anchos que tus caderas, dándote una silueta poderosa y atlética. El objetivo es crear equilibrio visual en la parte inferior.",favorece:["Pantalones con volumen o acampanados","Faldas con vuelo o tableadas","Escotes en V o U","Colores oscuros en la parte superior","Accesorios en la cadera"],evitar:["Hombros estructurados o con relleno","Bolsillos o detalles en el pecho","Rayas horizontales en la parte superior","Chaquetas muy voluminosas en hombros"]},triangulo:{nombre:"Triángulo o Pera",desc:"Tus caderas son más anchas que tus hombros. Eres la forma de cuerpo más común en mujeres latinas. El objetivo es equilibrar y dar protagonismo a tu parte superior.",favorece:["Tops y blusas con volumen o detalles en hombros","Colores y estampados en la parte superior","Pantalones oscuros o lisos","Escotes interesantes que suban la atención","Accesorios llamativos en cuello y orejas"],evitar:["Detalles, bolsillos o volumen en caderas","Pantalones con estampados llamativos","Faldas con mucho vuelo en cadera","Rayas horizontales en la parte inferior"]},reloj_arena:{nombre:"Reloj de Arena",desc:"Tienes hombros y caderas equilibradas con una cintura bien definida. Tu silueta es muy versátil — la mayoría de los estilos te favorecen cuando marcas la cintura.",favorece:["Vestidos entallados o wrap dress","Cinturones que marquen la cintura","Ropa ajustada que siga tus curvas","Telas con caída y estructura","Cualquier largo de falda"],evitar:["Ropa demasiado suelta que esconda tu figura","Prendas sin estructura que oculten la cintura","Capas excesivas en la zona media","Ropa oversize sin intención"]},rectangular:{nombre:"Rectangular o Atlética",desc:"Tus hombros, cintura y caderas están en proporciones similares. Tu silueta es limpia y versátil. El objetivo es crear la ilusión de curvas y cintura definida.",favorece:["Prendas con detalle en cintura","Vestidos con vuelo en la falda","Capas y texturas que creen dimensión","Tops con detalle en hombros o busto","Pantalones de corte recto o bota ancha"],evitar:["Ropa totalmente recta sin ningún detalle","Prendas que marquen la falta de curvas","Colores iguales de pies a cabeza sin corte en cintura"]},ovalado:{nombre:"Ovalado o Manzana",desc:"Tienes más volumen en la zona central. Tu objetivo es crear líneas verticales que alarguen y estructuren tu silueta, destacando tus piernas y escote.",favorece:["Líneas verticales y cortes en V","Telas con estructura y caída","Prendas que fluyan desde el busto hacia abajo","Colores oscuros en el centro","Accesorios largos tipo collares o pañuelos verticales"],evitar:["Cinturones muy anchos en la cintura","Prendas muy ajustadas en el abdomen","Estampados grandes en el centro","Telas rígidas que marquen la zona media"]}};
const coloresPorSubtono={frio:{paleta:"Subtono frío",favorecen:["Azul marino","Borgoña","Esmeralda","Rosa fucsia","Gris perla","Negro","Lavanda","Rojo frambuesa"],evitar:["Naranja","Amarillo cálido","Café terroso","Beige amarillento","Dorado"]},calido:{paleta:"Subtono cálido",favorecen:["Terracota","Naranja quemado","Coral","Camel","Dorado","Verde oliva","Mostaza","Café chocolate"],evitar:["Fucsia frío","Azul hielo","Gris plateado","Negro puro"]},neutro:{paleta:"Subtono neutro",favorecen:["Jade","Burdeos","Azul cobalto","Rosa palo","Blanco roto","Tostado","Verde bosque","Coral suave"],evitar:["Colores muy saturados o neón","Combinaciones de colores opuestos sin equilibrio"]}};
const coloresPorObjetivo={autoridad:["Navy azul oscuro","Negro estratégico","Burdeos","Gris antracita","Blanco impecable"],calidez:["Coral suave","Terracota","Verde salvia","Beige cálido","Rosa nude"],lujo:["Negro","Blanco roto","Camel","Dorado sutil","Borgoña"],modernidad:["Azul cobalto","Verde esmeralda","Naranja quemado","Fucsia","Rojo potente"]};
const alturaTexto={baja:"baja (menos de 5'2\" / 158 cm)",media:"media (5'2\" a 5'6\" / 158-168 cm)",alta:"alta (más de 5'6\" / 168 cm)"};
const volumenTexto={superior:"parte superior",inferior:"parte inferior",uniforme:"distribuido uniformemente",centro:"zona abdominal"};
const contextoTexto={redes:"en redes sociales",zoom:"en videollamadas",eventos:"en eventos presenciales",todos:"en todos los contextos"};
const objetivoTexto={autoridad:"autoridad y liderazgo",calidez:"calidez y cercanía",lujo:"lujo y exclusividad",modernidad:"dinamismo y modernidad"};
let respuestas={},pasoActual=0;
function detectarTipoCuerpo(){const hc=respuestas.hombros_caderas,c=respuestas.cintura;if(hc==="reloj_arena")return"reloj_arena";if(hc==="hombros_anchos")return"triangulo_invertido";if(hc==="caderas_anchas")return"triangulo";if((hc==="iguales"||!hc)&&c==="volumen_centro")return"ovalado";if(c==="volumen_centro")return"ovalado";return"rectangular";}
function generarPrompt(tipo,colores){const res=resultados[tipo];return`Actúa como una asesora de imagen personal especializada en mujeres empresarias.\n\nMis características físicas:\n- Tipo de cuerpo: ${res.nombre}\n- Zona de mayor volumen: ${volumenTexto[respuestas.zona_mas_volumen]||''}\n- Altura: ${alturaTexto[respuestas.altura]||''}\n- Subtono de piel: ${colores.paleta}\n- Colores que me favorecen: ${colores.favorecen.slice(0,5).join(', ')}\n\nMi negocio y contexto:\n- Quiero proyectar: ${objetivoTexto[respuestas.objetivo_imagen]||''}\n- Aparezco principalmente: ${contextoTexto[respuestas.contexto]||''}\n\nCon base en esto, dame:\n1. Un outfit completo para grabar reels o fotos profesionales\n2. Un outfit para reuniones importantes con clientes\n3. Un outfit para eventos de networking\n4. Los 3 colores que debo tener SIEMPRE en mi clóset como empresaria\n5. Una prenda que debo eliminar de mi clóset porque no me está favoreciendo`;}
function renderPregunta(){const container=document.getElementById('quiz-container');if(pasoActual>=preguntas.length){renderResultado();return;}const p=preguntas[pasoActual],prog=Math.round((pasoActual/preguntas.length)*100),sel=respuestas[p.id]||null;container.innerHTML=`<p class="step-label">Pregunta ${pasoActual+1} de ${preguntas.length}</p><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${prog}%"></div></div><p class="question-title">${p.titulo}</p><p class="question-sub">${p.sub}</p><div class="options-grid">${p.opciones.map(op=>`<button class="option-btn ${sel===op.valor?'selected':''}" onclick="seleccionar('${p.id}','${op.valor}',this)"><span class="option-icon">${op.emoji}</span><span class="option-text-wrap"><span class="option-main">${op.texto}</span>${op.detalle?`<span class="option-detail">${op.detalle}</span>`:''}</span></button>`).join('')}</div><div class="nav-row">${pasoActual>0?`<button class="btn-back" onclick="volver()">← Anterior</button>`:'<span></span>'}<button class="btn-next" id="btn-siguiente" onclick="siguiente()" ${!sel?'disabled':''}>${pasoActual===preguntas.length-1?'Ver mis resultados →':'Siguiente →'}</button></div>`;}
function seleccionar(id,valor,btn){respuestas[id]=valor;document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');document.getElementById('btn-siguiente').disabled=false;}
function siguiente(){pasoActual++;renderPregunta();}
function volver(){pasoActual--;renderPregunta();}
function renderResultado(){const tipo=detectarTipoCuerpo(),res=resultados[tipo],subtono=respuestas.subtono||'neutro',colores=coloresPorSubtono[subtono],coloresObj=coloresPorObjetivo[respuestas.objetivo_imagen]||coloresPorObjetivo.autoridad,prompt=generarPrompt(tipo,colores),container=document.getElementById('quiz-container');container.innerHTML=`<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:100%"></div></div><div class="congrats"><p class="congrats-title">¡Tu diagnóstico está listo! 🌸</p><p class="congrats-sub">Aquí están tus resultados personalizados</p></div><div class="result-card"><span class="result-badge">Tu tipo de cuerpo</span><p class="result-title">${res.nombre}</p><p class="result-desc">${res.desc}</p><p class="result-section">✅ Prendas que te favorecen</p><div class="tag-grid">${res.favorece.map(t=>`<span class="tag yes">${t}</span>`).join('')}</div><p class="result-section">❌ Prendas que te restan autoridad</p><div class="tag-grid">${res.evitar.map(t=>`<span class="tag no">${t}</span>`).join('')}</div></div><div class="result-card"><span class="result-badge">Tu paleta de colores — ${colores.paleta}</span><p class="result-section">Colores que te iluminan</p><div class="tag-grid">${colores.favorecen.map(c=>`<span class="tag yes">${c}</span>`).join('')}</div><p class="result-section">Colores que te apagan</p><div class="tag-grid">${colores.evitar.map(c=>`<span class="tag no">${c}</span>`).join('')}</div><p class="result-section">Colores de poder para tu objetivo</p><div class="tag-grid">${coloresObj.map(c=>`<span class="tag">${c}</span>`).join('')}</div></div><div class="result-card"><span class="result-badge">Tu prompt de IA personalizado</span><p class="result-desc">Copia este prompt en ChatGPT, Gemini o Claude y obtén recomendaciones completamente personalizadas:</p><div class="prompt-box" id="prompt-text">${prompt}</div><button class="copy-btn" onclick="copiarPrompt()">📋 Copiar prompt</button></div><button class="restart-btn" onclick="reiniciar()">🔄 Hacer el quiz de nuevo</button>`;}
function copiarPrompt(){const texto=document.getElementById('prompt-text').innerText;navigator.clipboard.writeText(texto).then(()=>{const btn=document.querySelector('.copy-btn');btn.textContent='✅ ¡Copiado!';setTimeout(()=>{btn.textContent='📋 Copiar prompt';},2000);});}
function reiniciar(){respuestas={};pasoActual=0;renderPregunta();}
renderPregunta();
</script>
</body>
</html>
